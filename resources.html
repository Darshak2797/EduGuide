<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - EduGuide</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="additional-styles.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">EduGuide</a>
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="pathways.html">Pathways</a>
                <a href="resources.html">Resources</a>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 40px;">
        <section class="step-section">
            <h2>Contact Us</h2>
            <p>Have questions? Fill out the form below and we'll get back to you.</p>
            <form id="contactForm" style="margin-top: 20px; display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" name="name" placeholder="Your Name" required style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color);">
                <input type="email" name="email" placeholder="Your Email" required style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color);">
                <textarea name="message" rows="5" placeholder="Your Message" required style="padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color);"></textarea>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </section>

        <section class="step-section" style="margin-top: 2rem;">
            <h2>Join Our Community</h2>
            <p>Connect with fellow students and career counselors in our community group.</p>
            <button class="btn btn-secondary" onclick="joinCommunity()" style="margin-top: 1rem;">Join WhatsApp Group</button>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2024 EduGuide. Project by Darshak Bhalgamiya. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
